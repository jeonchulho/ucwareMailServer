# ClamAV 백엔드 연동 설정
clamav {
  # antivirus 모듈 유형
  type = "clamav";
  # ClamAV 데몬 주소
  servers = "clamav:3310";
  # MIME 파트(첨부 포함)까지 검사
  scan_mime_parts = true;
  # 악성코드 탐지 시 메일 거부
  action = "reject";
  # 정상 메일 로그는 줄여 로그량 절감
  log_clean = false;
  # 일시 실패 시 재시도 횟수
  retransmits = 2;
  # 백엔드 응답 타임아웃
  timeout = 20s;
}
