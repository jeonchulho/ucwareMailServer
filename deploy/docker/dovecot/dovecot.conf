# 활성화할 프로토콜: IMAP(조회), POP3(레거시 조회), LMTP(로컬 전달)
protocols = imap pop3 lmtp
# 모든 인터페이스에서 수신
listen = *

# 도메인/사용자 기반 Maildir 경로: /var/mail/vhosts/<domain>/<user>
mail_location = maildir:/var/mail/vhosts/%d/%n
# 메일 저장용 시스템 계정 UID/GID 고정(컨테이너 내 권한 일관성 유지)
first_valid_uid = 5000
last_valid_uid = 5000

# 평문 인증 메커니즘 허용(실서비스는 TLS와 함께 사용 권장)
auth_mechanisms = plain login

# 비밀번호 파일 기반 인증 (mail-admin이 생성한 users.passwd 사용)
passdb {
  driver = passwd-file
  args = scheme=BLF-CRYPT username_format=%u /etc/dovecot/generated/users.passwd
}

# 가상 사용자 home/uid/gid를 정적으로 매핑
userdb {
  driver = static
  args = uid=5000 gid=5000 home=/var/mail/vhosts/%d/%n
}

# Postfix가 SASL 인증을 위임할 소켓
service auth {
  unix_listener /var/spool/postfix/private/auth {
    mode = 0660
    user = root
    group = root
  }
}

# Postfix가 로컬 메일 전달 시 사용할 LMTP 소켓
service lmtp {
  unix_listener /var/spool/postfix/private/dovecot-lmtp {
    mode = 0600
    user = root
    group = root
  }
}

# 개발/내부망 기본값: TLS 비활성화. 운영에서는 ssl=required + 인증서 경로 지정 권장.
ssl = no
