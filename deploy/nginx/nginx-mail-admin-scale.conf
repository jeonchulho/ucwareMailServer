# ucwareMailServer 대용량 운영 예시 Nginx 설정
#
# 이 파일은 "HTTP 계층(web-frontend, mail-admin)"을 여러 인스턴스로 분산하는 예시입니다.
# 아래 stream 섹션은 SMTP/IMAP/POP3에 대한 TCP 분산 예시도 포함하지만,
# 실제 메일 운영에서는 Postfix/Dovecot의 상태/저장소 구조를 먼저 설계해야 합니다.

worker_processes auto;

events {
    worker_connections 4096;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;

    # 실제 운영에서는 인증서 자동갱신(예: certbot/acme)과 함께 사용한다.
    # 아래 경로는 예시이며, 실제 경로에 맞춰 수정해야 한다.
    ssl_certificate     /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;
    ssl_session_timeout 10m;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    # web-frontend 다중 인스턴스 풀
    upstream web_frontend_pool {
        least_conn;
        server web-frontend-1:8090 max_fails=3 fail_timeout=10s;
        server web-frontend-2:8090 max_fails=3 fail_timeout=10s;
    }

    # mail-admin 다중 인스턴스 풀
    upstream mail_admin_pool {
        least_conn;
        server mail-admin-1:8080 max_fails=3 fail_timeout=10s;
        server mail-admin-2:8080 max_fails=3 fail_timeout=10s;
    }

    server {
        listen 80;
        server_name _;

        # 운영에서는 HTTPS 강제 리다이렉트 권장
        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl;
        server_name _;

        # 공통 프록시 헤더
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;

        # 웹 프론트엔드
        location / {
            proxy_pass http://web_frontend_pool;
            proxy_connect_timeout 3s;
            proxy_send_timeout 30s;
            proxy_read_timeout 30s;
        }

        # API 경로를 별도 mail-admin 풀로 전달
        location /v1/ {
            proxy_pass http://mail_admin_pool;
            proxy_connect_timeout 3s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }

        # 헬스체크는 바로 API 풀로 전달
        location /healthz {
            proxy_pass http://mail_admin_pool/healthz;
            proxy_connect_timeout 2s;
            proxy_send_timeout 5s;
            proxy_read_timeout 5s;
        }
    }
}

stream {
    # 아래는 가능성 예시다. 실제 운영 전에는 큐/세션/저장소 정합성을 먼저 검토해야 한다.

    # Submission(587) 로드밸런싱 예시
    upstream postfix_submission_pool {
        least_conn;
        server postfix-1:587 max_fails=3 fail_timeout=10s;
        server postfix-2:587 max_fails=3 fail_timeout=10s;
    }

    server {
        listen 587;
        proxy_timeout 300s;
        proxy_connect_timeout 5s;
        proxy_pass postfix_submission_pool;
    }

    # SMTP 25 로드밸런싱 예시
    upstream postfix_smtp_pool {
        least_conn;
        server postfix-1:25 max_fails=3 fail_timeout=10s;
        server postfix-2:25 max_fails=3 fail_timeout=10s;
    }

    server {
        listen 25;
        proxy_timeout 300s;
        proxy_connect_timeout 5s;
        proxy_pass postfix_smtp_pool;
    }

    # IMAPS 993 로드밸런싱 예시
    upstream dovecot_imaps_pool {
        least_conn;
        server dovecot-1:993 max_fails=3 fail_timeout=10s;
        server dovecot-2:993 max_fails=3 fail_timeout=10s;
    }

    server {
        listen 993;
        proxy_timeout 300s;
        proxy_connect_timeout 5s;
        proxy_pass dovecot_imaps_pool;
    }

    # POP3S 995 로드밸런싱 예시
    upstream dovecot_pop3s_pool {
        least_conn;
        server dovecot-1:995 max_fails=3 fail_timeout=10s;
        server dovecot-2:995 max_fails=3 fail_timeout=10s;
    }

    server {
        listen 995;
        proxy_timeout 300s;
        proxy_connect_timeout 5s;
        proxy_pass dovecot_pop3s_pool;
    }
}
