<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UCware Mail</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- ════════════════════════════════════════════════════════════
     로그인 화면
════════════════════════════════════════════════════════════ -->
<div id="login-screen">
  <div class="login-card">
    <div class="logo">UCware <span>M</span>ail</div>
    <h2>로그인</h2>
    <p>계속하려면 계정에 로그인하세요.</p>
    <div class="field">
      <label for="login-email">이메일</label>
      <input id="login-email" type="email" placeholder="admin@example.com" autocomplete="email">
    </div>
    <div class="field">
      <label for="login-pass">비밀번호</label>
      <input id="login-pass" type="password" placeholder="비밀번호" autocomplete="current-password">
    </div>
    <div class="err" id="login-err"></div>
    <button class="btn-primary" id="login-btn">로그인</button>
  </div>
</div>

<!-- ════════════════════════════════════════════════════════════
     앱 화면
════════════════════════════════════════════════════════════ -->
<div id="app-screen" hidden>

  <!-- ── 상단 헤더 ───────────────────────────────────────────── -->
  <header id="header">
    <div class="logo">UCware <em>Mail</em></div>
    <div id="search-wrap">
      <span class="ic">🔍</span>
      <input id="search-input" type="text" placeholder="메일 검색">
    </div>
    <div id="header-right">
      <button class="icon-btn" id="refresh-btn" title="새로고침">↻</button>
      <button id="user-avatar" title=""></button>
    </div>
  </header>

  <!-- ── 바디 행 ─────────────────────────────────────────────── -->
  <div id="body-row">

    <!-- 사이드바 -->
    <nav id="sidebar">
      <button class="compose-btn" id="compose-btn">
        <span class="ic">✏️</span>
        <span>편지쓰기</span>
      </button>
      <div id="nav-list"></div>
    </nav>

    <!-- 메인 패널 -->
    <div id="main-pane">

      <!-- 목록 툴바 -->
      <div id="list-toolbar">
        <div id="folder-title">받은편지함</div>
      </div>

      <!-- 메시지 목록 -->
      <div id="message-list"></div>

      <!-- 메시지 상세 -->
      <div id="message-detail"></div>

    </div><!-- /main-pane -->
  </div><!-- /body-row -->

</div><!-- /app-screen -->

<!-- ════════════════════════════════════════════════════════════
     편지쓰기 창 (하단 고정)
════════════════════════════════════════════════════════════ -->
<div id="compose-window">
  <div class="compose-header">
    <span>새 메일</span>
    <span class="ic" id="compose-close" title="닫기">✕</span>
  </div>
  <div class="compose-fields">
    <div class="compose-field">
      <label>받는 사람</label>
      <input id="compose-to" type="email" placeholder="받는 사람 이메일">
    </div>
    <div class="compose-field">
      <label>제목</label>
      <input id="compose-subj" type="text" placeholder="제목">
    </div>
  </div>
  <div class="compose-body-field">
    <textarea id="compose-body" placeholder="메일 내용을 입력하세요..."></textarea>
  </div>
  <div class="compose-footer">
    <button class="send-btn" id="send-btn">보내기</button>
  </div>
</div>

<!-- ════════════════════════════════════════════════════════════
     Toast 알림
════════════════════════════════════════════════════════════ -->
<div id="toast-container"></div>

<script src="js/api.js"></script>
<script src="js/app.js"></script>
</body>
</html>
